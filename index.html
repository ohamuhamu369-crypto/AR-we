<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>WebAR 動作確認</title>

<!--
  AR.js 公式デモと同じ最小構成
  Hiroマーカー: https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png
-->

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
  html, body { margin: 0; padding: 0; overflow: hidden; }
  #hud { position: fixed; top: 8px; left: 8px; z-index: 10; color: #fff;
         background: rgba(0,0,0,.6); padding: 6px 10px; border-radius: 6px;
         font-size: 12px; pointer-events: none;
         font-family: -apple-system, sans-serif; }
  #hud b { color: #ffe66d; }
</style>
</head>

<body style="margin: 0; overflow: hidden;">

<div id="hud">状態: <b id="state">起動中...</b></div>

<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;">

  <a-marker preset="hiro" id="marker">
    <a-box position="0 0.5 0"
           material="color: #ff6b9d; opacity: 0.9"
           animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
    </a-box>
    <a-box position="0 1.3 0"
           scale="0.3 0.3 0.3"
           material="color: #ffe66d">
    </a-box>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
const stateElem = document.getElementById('state');
const marker = document.getElementById('marker');

// マーカー検出イベント(これは標準のmarkerFound/Lostではなく、A-Frame経由で検出)
marker.addEventListener('markerFound', () => {
  stateElem.textContent = '🎉 検出!';
});
marker.addEventListener('markerLost', () => {
  stateElem.textContent = '探索中';
});

// シーン起動完了
document.querySelector('a-scene').addEventListener('loaded', () => {
  stateElem.textContent = '探索中';
});
</script>
</body>
</html>
