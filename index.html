<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>WebAR 動作確認</title>

<!--
========================================================================
  Step 1 動作確認用 (iOS Safari対応版)
  -----------------------------------------------------------------------
  - ページを開いた瞬間にカメラ許可ダイアログが出る方式
  - スタートボタン経由だとiOSがカメラ要求を拒否することがあるため変更
  - assets/ フォルダもファイルも不要
  - Hiroマーカーをかざすとピンクの回転キューブが表示される

  Hiroマーカー画像:
  https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png
========================================================================
-->

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000;
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #hud      { position: fixed; top: 8px; left: 8px; z-index: 10; color: #fff;
              background: rgba(0,0,0,.55); padding: 6px 10px; border-radius: 6px;
              font-size: 12px; line-height: 1.5; pointer-events: none; }
  #hud b    { color: #ffe66d; }
  #info     { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
              z-index: 10; color: #fff; background: rgba(0,0,0,.7);
              padding: 8px 14px; border-radius: 6px; font-size: 12px;
              max-width: 80%; text-align: center; pointer-events: none; }
</style>
</head>

<body>

<div id="hud">FPS: <b id="fps">--</b> / 状態: <b id="state">起動中</b></div>
<div id="info">Hiroマーカーをかざしてください</div>

<a-scene
    id="scene"
    vr-mode-ui="enabled: false"
    loading-screen="enabled: false"
    embedded
    renderer="antialias: false; precision: mediump; alpha: true"
    arjs="sourceType: webcam;
          sourceWidth: 640;  sourceHeight: 480;
          displayWidth: 640; displayHeight: 480;
          debugUIEnabled: false;
          detectionMode: mono_and_matrix;
          matrixCodeType: 3x3;
          maxDetectionRate: 30;">

  <a-marker preset="hiro" id="marker" emitevents="true"
            smooth="true" smoothCount="5">

    <a-box position="0 0.5 0"
           scale="1 1 1"
           material="color: #ff6b9d; shader: flat;
                     emissive: #ff6b9d; emissiveIntensity: 0.4"
           animation="property: rotation;
                      to: 0 360 0;
                      loop: true;
                      dur: 4000;
                      easing: linear">
    </a-box>

    <a-box position="0 1.3 0"
           scale="0.3 0.3 0.3"
           material="color: #ffe66d; shader: flat">
    </a-box>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
const marker = document.getElementById('marker');
const stateElem = document.getElementById('state');
const infoElem = document.getElementById('info');

// シーン起動完了でHUD更新
const scene = document.getElementById('scene');
scene.addEventListener('loaded', () => {
  stateElem.textContent = '探索中';
  infoElem.textContent = 'Hiroマーカーをかざしてください';
});

// マーカー検出イベント
marker.addEventListener('markerFound', () => {
  stateElem.textContent = 'マーカー検出';
  infoElem.textContent = '🎉 検出成功!';
});
marker.addEventListener('markerLost', () => {
  stateElem.textContent = '探索中';
  infoElem.textContent = 'Hiroマーカーをかざしてください';
});

// FPS表示
const fpsElem = document.getElementById('fps');
let frames = 0, lastT = performance.now();
(function tick() {
  frames++;
  const now = performance.now();
  if (now - lastT >= 1000) {
    fpsElem.textContent = Math.round(frames * 1000 / (now - lastT));
    frames = 0; lastT = now;
  }
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
