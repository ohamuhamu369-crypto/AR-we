<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>WebAR ブロッコリー風</title>

<!--
  HTMLだけで完結するブロッコリー風オブジェクト
  - GLBファイル不要
  - 球体と円錐を組み合わせて手作り
  - 軽い、すぐ動く
-->

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
  html, body { margin: 0; padding: 0; overflow: hidden; }
  #hud { position: fixed; top: 8px; left: 8px; z-index: 10; color: #fff;
         background: rgba(0,0,0,.6); padding: 6px 10px; border-radius: 6px;
         font-size: 12px; pointer-events: none;
         font-family: -apple-system, sans-serif; }
  #hud b { color: #ffe66d; }
</style>
</head>

<body style="margin: 0; overflow: hidden;">

<div id="hud">状態: <b id="state">起動中...</b></div>

<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;">

  <a-marker preset="hiro" id="marker">

    <!-- ブロッコリー風オブジェクト全体 -->
    <a-entity id="broccoli"
              animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">

      <!-- 茎(白っぽい円柱) -->
      <a-cylinder
          position="0 0.3 0"
          radius="0.15"
          height="0.6"
          color="#e8e0c8">
      </a-cylinder>

      <!-- 蕾の集合(緑の球を複数配置してモコモコ感) -->
      <!-- 中央の大きい球 -->
      <a-sphere position="0 0.9 0" radius="0.35" color="#3d8b3d"></a-sphere>

      <!-- 周りの小さい球(ブロッコリーのモコモコ部分) -->
      <a-sphere position="0.3 0.85 0" radius="0.22" color="#4ca64c"></a-sphere>
      <a-sphere position="-0.3 0.85 0" radius="0.22" color="#4ca64c"></a-sphere>
      <a-sphere position="0 0.85 0.3" radius="0.22" color="#4ca64c"></a-sphere>
      <a-sphere position="0 0.85 -0.3" radius="0.22" color="#4ca64c"></a-sphere>
      <a-sphere position="0.22 1.1 0.22" radius="0.2" color="#5cb85c"></a-sphere>
      <a-sphere position="-0.22 1.1 0.22" radius="0.2" color="#5cb85c"></a-sphere>
      <a-sphere position="0.22 1.1 -0.22" radius="0.2" color="#5cb85c"></a-sphere>
      <a-sphere position="-0.22 1.1 -0.22" radius="0.2" color="#5cb85c"></a-sphere>

      <!-- てっぺん -->
      <a-sphere position="0 1.25 0" radius="0.25" color="#3d8b3d"></a-sphere>

    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
const stateElem = document.getElementById('state');
const marker = document.getElementById('marker');

marker.addEventListener('markerFound', () => {
  stateElem.textContent = '🥦 検出!';
});
marker.addEventListener('markerLost', () => {
  stateElem.textContent = '探索中';
});

document.querySelector('a-scene').addEventListener('loaded', () => {
  stateElem.textContent = '探索中';
});
</script>
</body>
</html>
